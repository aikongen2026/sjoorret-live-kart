services:
  - type: web
    name: sjoorret-live-kart
    runtime: node
    plan: free
    buildCommand: "npm install"
    startCommand: "node server.js"
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: MET_USER_AGENT
        value: "sjoorret-live-kart/11 (+https://github.com/aikongen2026/sjoorret-live-kart)"
      - key: WATERMASK_MODE
        value: "tile"
